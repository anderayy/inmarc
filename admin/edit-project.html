<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Project | InMarc CMS</title>
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="admin-body">
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo">InMarc <span>Indonesia</span></div>
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item">
                <i class="fas fa-th-large"></i> Dashboard
            </a>
            <a href="portfolio.html" class="nav-item active">
                <i class="fas fa-briefcase"></i> Portfolio
            </a>
        </nav>
        <div class="sidebar-footer">
            <div class="user-avatar" id="user-initials">AD</div>
            <div class="user-info">
                <h5 id="user-name">Admin User</h5>
                <p id="user-email">admin@inmarc.id</p>
            </div>
            <button id="logout-btn" title="Logout" style="margin-left: auto; color: rgba(255,255,255,0.5); background: none;">
                <i class="fas fa-sign-out-alt"></i>
            </button>
        </div>
    </aside>

    <main class="main-content">
        <header class="content-header">
            <div>
                <nav class="breadcrumb">
                    <a href="portfolio.html">Portfolio</a> 
                    <i class="fas fa-chevron-right" style="font-size: 10px;"></i>
                    <span id="breadcrumb-action">Add New Project</span>
                </nav>
                <h1 id="page-title">Add New Portfolio Project</h1>
                <p>Fill in the details below to showcase your strategic impact.</p>
            </div>
        </header>

        <form id="project-form" class="form-card">
            <div class="form-grid">
                <div class="form-group full-width">
                    <label>Project Title</label>
                    <input type="text" name="title" placeholder="e.g. Smart Building Gate System - Jakarta" required>
                </div>

                <div class="form-group">
                    <label>Category</label>
                    <select name="category" required>
                        <option value="Industrial">Industrial</option>
                        <option value="Office">Office</option>
                        <option value="Retail">Retail</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Client Name</label>
                    <input type="text" name="clientName" placeholder="e.g. PT Sudirman Utama" required>
                </div>

                <div class="form-group">
                    <label>Project Date</label>
                    <input type="date" name="projectDate" required>
                </div>

                <div class="form-group">
                    <label>Status</label>
                    <select name="status" required>
                        <option value="Published">Published</option>
                        <option value="Draft">Draft</option>
                    </select>
                </div>

                <div class="form-group full-width">
                    <label>Featured Image</label>
                    <div class="upload-zone" id="upload-zone">
                        <i class="fas fa-cloud-upload-alt"></i>
                        <p>Click or drag to upload image</p>
                        <span>Support JPG, PNG (Max 5MB)</span>
                        <input type="file" id="file-input" accept="image/*" style="display: none;">
                        <input type="hidden" name="featuredImage" id="image-data">
                    </div>
                    <div id="image-preview" class="image-preview-container">
                        <span class="preview-placeholder">Preview will appear here</span>
                    </div>
                </div>

                <div class="form-group full-width">
                    <label>Description</label>
                    <textarea name="description" rows="6" placeholder="Describe the project scope and impact..." required></textarea>
                </div>
            </div>

            <div style="margin-top: 40px; display: flex; gap: 15px;">
                <button type="submit" class="btn btn-primary">Save Project</button>
                <a href="portfolio.html" class="btn btn-outline" style="border: none;">Cancel</a>
            </div>
        </form>
    </main>

    <script type="module">
        import AuthService from '../js/auth.js';
        import DataService from '../js/data-service.js';

        AuthService.checkAuth();

        const user = AuthService.getUser();
        document.getElementById('user-name').textContent = user.name;
        document.getElementById('user-email').textContent = user.email;
        document.getElementById('user-initials').textContent = user.name.split(' ').map(n => n[0]).join('');

        const form = document.getElementById('project-form');
        const fileInput = document.getElementById('file-input');
        const imageDataInput = document.getElementById('image-data');
        const uploadZone = document.getElementById('upload-zone');
        const imgPreview = document.getElementById('image-preview');

        // Check if editing
        const urlParams = new URLSearchParams(window.location.search);
        const projectId = urlParams.get('id');

        async function loadProject() {
            if (projectId) {
                const project = await DataService.getProjectById(projectId);
                if (project) {
                    document.getElementById('page-title').textContent = 'Edit Portfolio Project';
                    document.getElementById('breadcrumb-action').textContent = 'Edit Project';
                    
                    // Fill form
                    Object.keys(project).forEach(key => {
                        if (form.elements[key]) {
                            form.elements[key].value = project[key];
                        }
                    });
                    if (project.featuredImage) {
                        updatePreview(project.featuredImage);
                    }
                }
            }
        }

        loadProject();

        // File Upload Logic
        uploadZone.onclick = () => fileInput.click();

        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                if (file.size > 5 * 1024 * 1024) {
                    alert('Image is too large. Maximum size is 5MB.');
                    return;
                }
                const reader = new FileReader();
                reader.onload = (event) => {
                    const base64 = event.target.result;
                    imageDataInput.value = base64;
                    updatePreview(base64);
                };
                reader.readAsDataURL(file);
            }
        };

        function updatePreview(url) {
            if (url) {
                imgPreview.innerHTML = `<img src="${url}" class="preview-img"><button type="button" class="remove-img" id="remove-img"><i class="fas fa-times"></i></button>`;
                document.getElementById('remove-img').onclick = (e) => {
                    e.stopPropagation();
                    imageDataInput.value = '';
                    imgPreview.innerHTML = '<span class="preview-placeholder">Image Preview</span>';
                };
            } else {
                imgPreview.innerHTML = '<span class="preview-placeholder">Image Preview</span>';
            }
        }

        // Save
        form.onsubmit = async (e) => {
            e.preventDefault();
            const submitBtn = form.querySelector('button[type="submit"]');
            const originalText = submitBtn.innerHTML;
            
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';

            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());

            try {
                if (projectId) {
                    await DataService.updateProject(projectId, data);
                } else {
                    await DataService.addProject(data);
                }
                window.location.href = 'portfolio.html';
            } catch (error) {
                console.error('Error saving project:', error);
                alert('Failed to save project. Please check your connection.');
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalText;
            }
        };

        document.getElementById('logout-btn').onclick = () => AuthService.logout();
    </script>
</body>
</html>
