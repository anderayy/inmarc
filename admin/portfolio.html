<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Management | InMarc CMS</title>
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="admin-body">
    <!-- Sidebar (Same as dashboard) -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo">
                <img src="../assets/logos/inmarc_logo.png" alt="InMarc Indonesia" style="height: 80px; width: auto; filter: brightness(0) invert(1);">
            </div>
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item">
                <i class="fas fa-th-large"></i> Dashboard
            </a>
            <a href="portfolio.html" class="nav-item active">
                <i class="fas fa-briefcase"></i> Portfolio
            </a>
        </nav>
        <div class="sidebar-footer">
            <div class="user-avatar" id="user-initials">AD</div>
            <div class="user-info">
                <h5 id="user-name">Admin User</h5>
                <p id="user-email">admin@inmarc.id</p>
            </div>
            <button id="logout-btn" title="Logout" style="margin-left: auto; color: rgba(255,255,255,0.5); background: none;">
                <i class="fas fa-sign-out-alt"></i>
            </button>
        </div>
    </aside>

    <main class="main-content">
        <header class="content-header">
            <div>
                <nav class="breadcrumb">
                    <a href="dashboard.html">Dashboard</a>
                    <i class="fas fa-chevron-right" style="font-size: 10px;"></i>
                    <span>Portfolio</span>
                </nav>
                <h1>Project Gallery</h1>
                <p>Manage your strategic project portfolio and impact stories.</p>
            </div>
            <a href="edit-project.html" class="btn btn-primary">
                <i class="fas fa-plus"></i> Add New Project
            </a>
        </header>

        <div class="data-card">
            <div class="table-header">
                <div class="search-bar">
                    <i class="fas fa-search"></i>
                    <input type="text" id="project-search" placeholder="Search projects...">
                </div>
            </div>
            <table id="portfolio-table">
                <thead>
                    <tr>
                        <th>Project Title</th>
                        <th>Category</th>
                        <th>Last Update</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Content via JS -->
                </tbody>
            </table>
            <div class="pagination">
                <div id="pagination-info">Loading projects...</div>
                <div class="page-btns" id="pagination-btns">
                    <!-- Pagination buttons -->
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import AuthService from '../js/auth.js';
        import DataService from '../js/data-service.js';

        AuthService.checkAuth();

        const user = AuthService.getUser();
        document.getElementById('user-name').textContent = user.name;
        document.getElementById('user-email').textContent = user.email;
        document.getElementById('user-initials').textContent = user.name.split(' ').map(n => n[0]).join('');

        let projects = [];
        let currentPage = 1;
        const itemsPerPage = 10;

        async function renderTable() {
            projects = await DataService.getProjects();
            const searchTerm = document.getElementById('project-search').value.toLowerCase();
            const filteredProjects = projects.filter(p => 
                p.title.toLowerCase().includes(searchTerm) || 
                p.category.toLowerCase().includes(searchTerm)
            );

            const totalPages = Math.ceil(filteredProjects.length / itemsPerPage);
            const start = (currentPage - 1) * itemsPerPage;
            const paginatedProjects = filteredProjects.slice(start, start + itemsPerPage);

            const tbody = document.querySelector('#portfolio-table tbody');
            tbody.innerHTML = paginatedProjects.map(p => `
                <tr>
                    <td>
                        <div class="project-title-cell">
                            ${p.featuredImage ? 
                                `<img src="${p.featuredImage}" class="project-thumb">` : 
                                `<div class="project-thumb-placeholder"><i class="fas fa-image"></i></div>`
                            }
                            <div>
                                <div style="font-weight: 600;">${p.title || 'Untitled Project'}</div>
                                <div style="font-size: 12px; color: var(--text-muted);">${p.clientName || 'N/A'}</div>
                            </div>
                        </div>
                    </td>
                    <td><span class="badge-status" style="background: rgba(37, 99, 235, 0.1); color: var(--primary-blue);">${p.category || 'Uncategorized'}</span></td>
                    <td>${p.updatedAt ? new Date(p.updatedAt).toLocaleDateString() : 'Just now'}</td>
                    <td>
                        <span class="badge-status ${(p.status || 'Draft').toLowerCase()}">${p.status || 'Draft'}</span>
                    </td>
                    <td class="actions">
                        <a href="edit-project.html?id=${p.id}" class="btn-action" title="Edit"><i class="fas fa-edit"></i></a>
                        <button class="btn-action btn-delete" title="Delete" data-id="${p.id}"><i class="fas fa-trash-alt"></i></button>
                    </td>
                </tr>
            `).join('');

            // Update info
            const end = Math.min(start + itemsPerPage, filteredProjects.length);
            document.getElementById('pagination-info').textContent = `Showing ${filteredProjects.length > 0 ? start + 1 : 0} to ${end} of ${filteredProjects.length} projects`;

            // Pagination buttons
            const pgBtns = document.getElementById('pagination-btns');
            pgBtns.innerHTML = '';
            for (let i = 1; i <= totalPages; i++) {
                const btn = document.createElement('button');
                btn.className = `page-btn ${i === currentPage ? 'active' : ''}`;
                btn.textContent = i;
                btn.onclick = () => { currentPage = i; renderTable(); };
                pgBtns.appendChild(btn);
            }

            // Attach delete listeners
            document.querySelectorAll('.btn-delete').forEach(btn => {
                btn.onclick = async () => {
                    if (confirm('Are you sure you want to delete this project?')) {
                        await DataService.deleteProject(btn.dataset.id);
                        renderTable();
                    }
                };
            });
        }

        document.getElementById('project-search').oninput = () => {
            currentPage = 1;
            renderTable();
        };

        document.getElementById('logout-btn').onclick = () => AuthService.logout();

        renderTable();
    </script>
</body>
</html>
